                ctx.fillRect(bookX + bookW / 2 + 3, bookY, 12, bookH);
                ctx.globalAlpha = 1;
                // Book border
                ctx.strokeStyle = '#5D4037';
                ctx.lineWidth = 3;
                ctx.strokeRect(bookX, bookY, bookW, bookH);
                if (bookOpen < 1) return;
                // === LEFT PAGE: Scene illustration ===
                const lx = bookX + 15;
                const ly = bookY + 15;
                const pw = bookW / 2 - 33;
                const ph = bookH - 30;
                // Illustration border
                ctx.strokeStyle = '#C8A882';
                ctx.lineWidth = 2;
                ctx.strokeRect(lx, ly, pw, ph);
                // Sky gradient in illustration
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(lx + 1, ly + 1, pw - 2, ph * 0.55);
                // Sun
                ctx.fillStyle = '#FFE44D';
                ctx.globalAlpha = 0.9;
                ctx.beginPath();
                ctx.arc(lx + pw - 40, ly + 40, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                // Clouds drifting
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                const cloudDrift = (t * 0.3) % (pw + 60);
                ctx.fillRect(lx + cloudDrift - 30, ly + 25, 40, 12);
                ctx.fillRect(lx + cloudDrift - 15, ly + 20, 30, 10);
                ctx.fillRect(lx + (cloudDrift + 120) % (pw + 60) - 30, ly + 50, 35, 10);
                // Green hills
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.moveTo(lx, ly + ph * 0.55);
                for (let i = 0; i <= pw; i += 3) {
                    ctx.lineTo(lx + i, ly + ph * 0.5 + Math.sin(i * 0.03) * 15 + 10);
                }
                ctx.lineTo(lx + pw, ly + ph);
                ctx.lineTo(lx, ly + ph);
                ctx.closePath();
                ctx.fill();
                // Grass
                ctx.fillStyle = '#388E3C';
                ctx.fillRect(lx + 1, ly + ph * 0.7, pw - 2, ph * 0.3 - 1);
                // Castle in distance (McNug's)
                const castleX = lx + pw - 70;
                const castleY = ly + ph * 0.32;
                ctx.fillStyle = '#555555';
                ctx.fillRect(castleX, castleY, 50, 50);
                ctx.fillRect(castleX - 8, castleY - 15, 15, 25);
                ctx.fillRect(castleX + 43, castleY - 15, 15, 25);
                ctx.fillRect(castleX + 18, castleY - 25, 15, 35);
                // Castle battlements
                ctx.fillStyle = '#666666';
                for (let bi = 0; bi < 4; bi++) ctx.fillRect(castleX - 8 + bi * 5, castleY - 20, 3, 5);
                for (let bi = 0; bi < 4; bi++) ctx.fillRect(castleX + 43 + bi * 5, castleY - 20, 3, 5);
                for (let bi = 0; bi < 4; bi++) ctx.fillRect(castleX + 18 + bi * 5, castleY - 30, 3, 5);
                // Castle window with Pine's silhouette
                ctx.fillStyle = '#FFCC00';
                ctx.fillRect(castleX + 26, castleY - 18, 7, 9);
                if (t > 60) {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(castleX + 28, castleY - 16, 3, 5);
                    ctx.fillStyle = '#222222';
                    ctx.fillRect(castleX + 28, castleY - 16, 3, 2);
                }
                // Prince Apple on the hill (animated)
                const appleX = lx + 60;
                const appleY = ly + ph * 0.52;
                const heroStand = Math.sin(t * 0.06) * 2;
                // Orange cat body
                ctx.fillStyle = '#FF8C00';
                ctx.fillRect(appleX - 6, appleY + 4 + heroStand, 12, 10);
                // Head
                ctx.fillStyle = '#FF8C00';
                ctx.fillRect(appleX - 5, appleY - 5 + heroStand, 10, 9);
                // Ears
                ctx.fillStyle = '#FF8C00';
                ctx.beginPath();
                ctx.moveTo(appleX - 5, appleY - 5 + heroStand);
                ctx.lineTo(appleX - 3, appleY - 10 + heroStand);
                ctx.lineTo(appleX - 1, appleY - 5 + heroStand);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(appleX + 5, appleY - 5 + heroStand);
                ctx.lineTo(appleX + 3, appleY - 10 + heroStand);
                ctx.lineTo(appleX + 1, appleY - 5 + heroStand);
                ctx.closePath();
                ctx.fill();
                // Crown
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(appleX - 4, appleY - 8 + heroStand, 8, 3);
                ctx.fillRect(appleX - 2, appleY - 11 + heroStand, 2, 4);
                ctx.fillRect(appleX + 1, appleY - 12 + heroStand, 2, 5);

                ctx.fillStyle = '#000000';
                ctx.fillRect(appleX - 3, appleY - 2 + heroStand, 2, 2);
                ctx.fillRect(appleX + 1, appleY - 2 + heroStand, 2, 2);

                ctx.lineTo(appleX - 10 + capeWave, appleY + 16 + heroStand);

                    for (let si = 0; si < starCount; si++) {

                        ctx.globalAlpha = twinkle;

                    ctx.fillText(sub.substring(0, subChars), rx + rpw / 2, ry + 50);
                }
                // Decorative line

                    const lineW = Math.min((t - 100) * 2, rpw - 40);
                    ctx.strokeStyle = '#C8A882';

                }
                // Story text
                if (t > 120) {
                    ctx.fillStyle = '#4A3728';
                    ctx.font = '12px Georgia, serif';
                    ctx.textAlign = 'center';
                    const storyLines = [

            drawLevelIntroScreen() {
                const levelNames = {
                    1: 'Cat Village',
                    2: 'The Feather Fields',
                    3: 'The Dark Forest',

                ctx.fillStyle = '#222222';
                ctx.fillRect(px - 12, py, 10, 12);
                ctx.fillRect(px + 6, py + 8, 6, 12);

                ctx.fillRect(px - 10, py - 14, 20, 16);

                ctx.fillRect(px - 10, py - 14, 10, 8);

                ctx.beginPath();
                ctx.moveTo(px - 10, py - 14);
                ctx.lineTo(px - 6, py - 22);
                ctx.lineTo(px - 2, py - 14);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(px + 10, py - 14);
                ctx.lineTo(px + 6, py - 22);
                ctx.lineTo(px + 2, py - 14);
                ctx.closePath();
                ctx.fill();

                ctx.moveTo(px - 8, py - 14);
                ctx.lineTo(px - 6, py - 19);
                ctx.lineTo(px - 4, py - 14);

                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(px + 8, py - 14);
                ctx.lineTo(px + 6, py - 19);
                ctx.lineTo(px + 4, py - 14);
                ctx.closePath();
                ctx.fill();

            drawHUD() {
                const ctx = this.ctx;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
                ctx.fillRect(0, 0, 250, 55);
                const levelNames = {
                    1: 'Cat Village',
                    2: 'The Feather Fields',
                    3: 'The Dark Forest',
                    4: 'The Dungeon',
                    5: 'The Throne Room'
                };
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(levelNames[this.currentLevel], CONFIG.CANVAS_WIDTH / 2, 12);
                // 3 hearts for current HP + lives counter
                for (let i = 0; i < this.player.maxHp; i++) {
                    const hx = 12 + i * 15;
                    const hy = 20;
                    const filled = i < this.player.hp;
                    const s = 0.65;
                    ctx.fillStyle = filled ? '#FF3333' : '#552222';
                    ctx.beginPath();
                    ctx.moveTo(hx, hy + 4 * s);
                    ctx.bezierCurveTo(hx, hy, hx + 9 * s, hy, hx + 9 * s, hy + 4 * s);
                    ctx.bezierCurveTo(hx + 9 * s, hy + 8 * s, hx, hy + 14 * s, hx, hy + 14 * s);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(hx, hy + 4 * s);
                    ctx.bezierCurveTo(hx, hy, hx - 9 * s, hy, hx - 9 * s, hy + 4 * s);
                    ctx.bezierCurveTo(hx - 9 * s, hy + 8 * s, hx, hy + 14 * s, hx, hy + 14 * s);
                    ctx.fill();
                    if (filled) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                        ctx.beginPath();
                        ctx.arc(hx - 2, hy + 3, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                // Lives counter (x N) next to hearts
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`x${this.player.lives + 1}`, 12 + this.player.maxHp * 15 + 4, 30);
                // Yarn ball - moved below hearts with clear spacing
                const hasYarn = this.player.yarnBalls > 0;
                const yarnX = 14;
                const yarnY = 38;
                ctx.fillStyle = hasYarn ? '#FF69B4' : '#664455';
                ctx.beginPath();
                ctx.arc(yarnX + 5, yarnY + 1, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = hasYarn ? '#FFFFFF' : '#777777';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`x ${this.player.yarnBalls}`, yarnX + 14, yarnY + 5);
                if (this.player.speedBoostTimer > 0) {
                    const barWidth = 50;
                    const barHeight = 6;
                    const barX = 14;
                    const barY = 55;
                    ctx.fillStyle = '#333333';
                    ctx.fillRect(barX, barY, barWidth, barHeight);
                    const fillWidth = (this.player.speedBoostTimer / 480) * barWidth;
                    ctx.fillStyle = '#52D97A';
                    ctx.fillRect(barX, barY, fillWidth, barHeight);
                    ctx.strokeStyle = '#2ECC71';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(barX, barY, barWidth, barHeight);
                    ctx.fillStyle = '#52D97A';
                    ctx.font = '8px Arial';
                    ctx.fillText('BOOST', barX + barWidth + 5, barY + 5);
                }
                // Score and timer panel - top right
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(CONFIG.CANVAS_WIDTH - 170, 0, 170, 55);
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 1;
                ctx.strokeRect(CONFIG.CANVAS_WIDTH - 170, 0, 170, 55);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(`Score: ${this.score}`, CONFIG.CANVAS_WIDTH - 12, 20);
                const totalSecs = Math.floor(this.levelTimer / 60);
                const mins = Math.floor(totalSecs / 60);
                const secs = totalSecs % 60;
                const par = this.parTimes[this.currentLevel] || 90;
                const timeColor = totalSecs > par ? '#FF6666' : '#66FF66';
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('TIME:', CONFIG.CANVAS_WIDTH - 160, 44);
                ctx.fillStyle = timeColor;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(`${mins}:${secs < 10 ? '0' : ''}${secs}`, CONFIG.CANVAS_WIDTH - 12, 47);
                ctx.textAlign = 'left';
                // Boss health bar for Level 5
                if (this.currentLevel === 5 && this.level.boss && !this.level.boss.defeated) {
                    const boss = this.level.boss;
                    const barW = 200;
                    const barH = 12;
                    const barX = CONFIG.CANVAS_WIDTH / 2 - barW / 2;
                    const barY = CONFIG.CANVAS_HEIGHT - 30;
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    ctx.fillRect(barX - 4, barY - 18, barW + 8, barH + 22);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('McNug the Chicken King', CONFIG.CANVAS_WIDTH / 2, barY - 5);
                    ctx.fillStyle = '#333333';
                    ctx.fillRect(barX, barY, barW, barH);
                    const hpFill = (boss.hp / boss.maxHp) * barW;
                    ctx.fillStyle = boss.phase >= 3 ? '#FF0000' : boss.phase >= 2 ? '#FF6600' : '#CC0000';
                    ctx.fillRect(barX, barY, hpFill, barH);
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(barX, barY, barW, barH);
                    ctx.textAlign = 'left';
                }
            }
            run() {
                const gameLoop = () => {
                    this.update();
                    this.draw();
                    requestAnimationFrame(gameLoop);
                };
                gameLoop();
            }
        }
        const canvas = document.getElementById('gameCanvas');
        const game = new Game(canvas);
        window.game = game;
        game.run();
</script>
</body>
</html>
