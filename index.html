<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Apple: The Rescue of Princess Pine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #87CEEB; font-family: 'Arial', sans-serif; overflow: hidden; }
        #gameContainer { position: relative; width: 800px; height: 480px; border: 4px solid #8B4513; box-shadow: 0 0 20px rgba(0,0,0,0.3); background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="480"></canvas>
    </div>
<script>
        const CONFIG = {
            CANVAS_WIDTH: 800,
            CANVAS_HEIGHT: 480,
            FPS: 60,
            GRAVITY: 0.5,
            PLAYER_SPEED: 4,
            PLAYER_JUMP_POWER: 13,
            ENEMY_SPEED: 1.5,
            LEVEL_WIDTH_1: 3200,
            LEVEL_WIDTH_2: 3800,
            LEVEL_WIDTH_3: 4000,
            LEVEL_WIDTH_4: 4200,
            LEVEL_WIDTH_5: 800,
            GROUND_Y: 440,
            GROUND_HEIGHT: 40
        };
        class Particle {
            constructor(x, y, vx, vy, color, life) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = life;
                this.maxLife = life;
                this.size = 3;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life--;
                this.size = Math.max(1, (this.life / this.maxLife) * 3);
            }
            draw(ctx, cameraX) {
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - cameraX - this.size / 2, this.y - this.size / 2, this.size, this.size);
                ctx.globalAlpha = 1;
            }
            isAlive() {
                return this.life > 0;
            }
        }
        class ParticleEmitter {
            constructor() {
                this.particles = [];
            }
            emit(x, y, count, colors, speedRange = {
                min: 1,
                max: 3
            }) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.random() * Math.PI * 2);
                    const speed = Math.random() * (speedRange.max - speedRange.min) + speedRange.min;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed - 2;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    this.particles.push(new Particle(x, y, vx, vy, color, 30));
                }
            }
            update() {
                this.particles = this.particles.filter(p => {
                    p.update();
                    return p.isAlive();
                });
            }
            draw(ctx, cameraX) {
                for (let p of this.particles) {
                    p.draw(ctx, cameraX);
                }
            }
        }
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 32;
                this.height = 38;
                this.vx = 0;
                this.vy = 0;
                this.isGrounded = false;
                this.hp = 3;
                this.maxHp = 3;
                this.invincibleTime = 0;
                this.facing = 1;
                this.checkpointX = x;
                this.checkpointY = y;
                this.yarnBalls = 0;
                this.speedBoostTimer = 0;
                this.baseSpeed = CONFIG.PLAYER_SPEED;
                this.lives = 2;
                this.dead = false;
            }
            setCheckpoint(x, y) {
                this.checkpointX = x;
                this.checkpointY = y;
            }
            respawn() {
                if (this.lives > 0) {
                    this.lives--;
                    this.x = this.checkpointX;
                    this.y = this.checkpointY;
                    this.vx = 0;
                    this.vy = 0;
                    this.isGrounded = false;
                    this.hp = this.maxHp;
                    this.invincibleTime = 120;
                } else {
                    this.dead = true;
                }
            }
            takeDamage() {
                if (this.invincibleTime <= 0) {
                    this.hp--;
                    this.invincibleTime = 120;
                    return true;
                }
                return false;
            }
            heal(amount = 1) {
                if (this.hp < this.maxHp) {
                    this.hp = Math.min(this.maxHp, this.hp + amount);
                    return true;
                }
                return false;
            }
            addYarnBalls(count) {
                this.yarnBalls += count;
            }
            applyCatnipBoost() {
                this.speedBoostTimer = 480;
            }
            throwYarnBall() {
                if (this.yarnBalls > 0) {
                    this.yarnBalls--;
                    return new YarnBall(this.x + this.width / 2, this.y + this.height / 2, this.facing);
                }
                return null;
            }
            update(keys, levelWidth) {
                const currentSpeed = this.speedBoostTimer > 0 ? this.baseSpeed * 2 : this.baseSpeed;
                this.vx = 0;
                if (keys['ArrowLeft']) {
                    this.vx = -currentSpeed;
                    this.facing = -1;
                }
                if (keys['ArrowRight']) {
                    this.vx = currentSpeed;
                    this.facing = 1;
                }
                if (keys[' '] && this.isGrounded) {
                    const jumpPower = this.speedBoostTimer > 0 ? CONFIG.PLAYER_JUMP_POWER * 1.3 : CONFIG.PLAYER_JUMP_POWER;
                    this.vy = -jumpPower;
                    this.isGrounded = false;
                }
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 15) this.vy = 15;
                this.x += this.vx;
                this.y += this.vy;
                this.isGrounded = false;
                if (this.y > CONFIG.GROUND_Y + 10) {
                    const damaged = this.takeDamage();
                    if (damaged && this.hp <= 0) {
                        this.respawn();
                    } else {
                        this.x = this.checkpointX;
                        this.y = this.checkpointY;
                        this.vy = 0;
                    }
                }
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > levelWidth) this.x = levelWidth - this.width;
                if (this.invincibleTime > 0) this.invincibleTime--;
                if (this.speedBoostTimer > 0) this.speedBoostTimer--;
            }
            collidesWith(obj) {
                return this.x < obj.x + obj.width && this.x + this.width > obj.x && this.y < obj.y + obj.height && this.y + this.height > obj.y;
            }
            bounceOffEnemy() {
                this.vy = -CONFIG.PLAYER_JUMP_POWER * 0.8;
            }
            draw(ctx, cameraX, frameCount) {
                const screenX = this.x - cameraX;
                const screenY = this.y;
                if (this.invincibleTime > 0 && Math.floor(this.invincibleTime / 10) % 2 === 0) return;
                if (this.yarnBalls > 0) {
                    const glow = 0.12 + Math.sin((frameCount || 0) * 0.1) * 0.06;
                    ctx.fillStyle = `rgba(255, 105, 180, ${glow})`;
                    ctx.beginPath();
                    ctx.arc(screenX + this.width / 2, screenY + this.height / 2, 26, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (this.speedBoostTimer > 0) {
                    const glow = 0.1 + Math.sin((frameCount || 0) * 0.15) * 0.08;
                    ctx.fillStyle = `rgba(50, 200, 100, ${glow})`;
                    ctx.beginPath();
                    ctx.arc(screenX + this.width / 2, screenY + this.height / 2, 28, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.save();
                if (this.facing === -1) {
                    ctx.translate(screenX + this.width, screenY);
                    ctx.scale(-1, 1);
                    ctx.translate(-this.width, 0);
                } else {
                    ctx.translate(screenX, screenY);
                }
                ctx.fillStyle = '#FF8C00';
                ctx.fillRect(27, 12, 4, 4);
                ctx.fillRect(29, 8, 4, 4);
                ctx.fillRect(28, 5, 4, 4);
                ctx.fillStyle = '#E07000';
                ctx.fillRect(26, 4, 4, 3);
                ctx.fillStyle = '#FF8C00';
                ctx.fillRect(6, 18, 22, 14);
                ctx.fillStyle = '#FFB347';
                ctx.fillRect(10, 20, 14, 10);
                ctx.fillStyle = '#E07000';
                ctx.fillRect(7, 20, 3, 2);
                ctx.fillRect(7, 24, 4, 2);
                ctx.fillRect(7, 28, 3, 2);
                ctx.fillStyle = '#FF8C00';
                ctx.fillRect(8, 32, 5, 5);
                ctx.fillRect(19, 32, 5, 5);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(8, 35, 5, 3);
                ctx.fillRect(19, 35, 5, 3);
                ctx.fillStyle = '#FF8C00';
                ctx.fillRect(4, 4, 22, 14);
                ctx.fillRect(6, 2, 18, 4);
                ctx.fillRect(2, 10, 4, 6);
                ctx.fillRect(24, 10, 4, 6);
                ctx.fillStyle = '#FFB347';
                ctx.fillRect(8, 8, 14, 8);
                ctx.fillStyle = '#FF8C00';
                ctx.fillRect(4, -2, 6, 6);
                ctx.fillRect(5, -4, 4, 3);
                ctx.fillStyle = '#FF9EB5';
                ctx.fillRect(6, -1, 3, 4);
                ctx.fillStyle = '#FF8C00';
                ctx.fillRect(20, -2, 6, 6);
                ctx.fillRect(21, -4, 4, 3);
                ctx.fillStyle = '#FF9EB5';
                ctx.fillRect(22, -1, 3, 4);
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(8, -1, 14, 4);
                ctx.fillRect(9, -4, 3, 3);
                ctx.fillRect(14, -5, 3, 4);
                ctx.fillRect(20, -4, 3, 3);
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(10, 0, 2, 2);
                ctx.fillStyle = '#4169E1';
                ctx.fillRect(15, -1, 2, 2);
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(21, 0, 2, 2);
                ctx.fillStyle = '#DAA520';
                ctx.fillRect(8, 2, 14, 1);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(8, 7, 6, 5);
                ctx.fillRect(17, 7, 6, 5);
                ctx.fillStyle = '#2ECC71';
                ctx.fillRect(10, 7, 4, 5);
                ctx.fillRect(19, 7, 4, 5);
                ctx.fillStyle = '#1FA04E';
                ctx.fillRect(10, 7, 1, 5);
                ctx.fillRect(13, 7, 1, 5);
                ctx.fillRect(19, 7, 1, 5);
                ctx.fillRect(22, 7, 1, 5);
                ctx.fillStyle = '#000000';
                ctx.fillRect(11, 7, 2, 5);
                ctx.fillRect(20, 7, 2, 5);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(10, 8, 2, 2);
                ctx.fillRect(19, 8, 2, 2);
                ctx.fillStyle = '#FF9EB5';
                ctx.fillRect(14, 13, 3, 2);
                ctx.fillRect(15, 12, 1, 1);
                ctx.fillStyle = '#000000';
                ctx.fillRect(14, 15, 1, 1);
                ctx.fillRect(16, 15, 1, 1);
                ctx.fillRect(13, 14, 1, 1);
                ctx.fillRect(17, 14, 1, 1);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(4, 12);
                ctx.lineTo(-4, 10);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(4, 14);
                ctx.lineTo(-5, 14);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(4, 16);
                ctx.lineTo(-4, 18);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(26, 12);
                ctx.lineTo(34, 10);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(26, 14);
                ctx.lineTo(35, 14);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(26, 16);
                ctx.lineTo(34, 18);
                ctx.stroke();
                ctx.restore();
            }
        }
        class Enemy {
            constructor(x, y, leftBound, rightBound) {
                this.x = x;
                this.y = y;
                this.width = 28;
                this.height = 28;
                this.leftBound = leftBound;
                this.rightBound = rightBound;
                this.direction = 1;
                this.vx = CONFIG.ENEMY_SPEED * this.direction;
                this.vy = 0;
            }
            update() {
                if (this.x + this.width / 2 >= this.rightBound) this.direction = -1;
                if (this.x + this.width / 2 <= this.leftBound) this.direction = 1;
                this.vx = CONFIG.ENEMY_SPEED * this.direction;
                this.x += this.vx;
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 15) this.vy = 15;
                this.y += this.vy;
                if (this.y > CONFIG.GROUND_Y + 20) {
                    this.hp = 0;
                }
            }
            platformCheck(platforms) {
                let onPlatform = false;
                for (let p of platforms) {
                    if (this.x + this.width > p.x && this.x < p.x + p.width && this.y + this.height >= p.y && this.y + this.height <= p.y + p.height + 8 && this.vy >= 0) {
                        this.y = p.y - this.height;
                        this.vy = 0;
                        onPlatform = true;
                        const lookAhead = this.direction > 0 ? this.x + this.width + 4 : this.x - 4;
                        let groundAhead = false;
                        for (let p2 of platforms) {
                            if (lookAhead >= p2.x && lookAhead <= p2.x + p2.width && this.y + this.height >= p2.y - 4 && this.y + this.height <= p2.y + p2.height + 8) {
                                groundAhead = true;
                                break;
                            }
                        }
                        if (!groundAhead) {
                            this.direction *= -1;
                            this.vx = CONFIG.ENEMY_SPEED * this.direction;
                        }
                        return;
                    }
                }
            }
            collidesWith(obj) {
                return this.x < obj.x + obj.width && this.x + this.width > obj.x && this.y < obj.y + obj.height && this.y + this.height > obj.y;
            }
            draw(ctx, cameraX) {
                const screenX = this.x - cameraX;
                const screenY = this.y;
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(screenX + 3, screenY + 12, 22, 12);
                ctx.fillStyle = '#FFB366';
                ctx.fillRect(screenX + 8, screenY + 23, 2, 5);
                ctx.fillRect(screenX + 18, screenY + 23, 2, 5);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(screenX + 6, screenY + 2, 16, 10);
                ctx.fillStyle = '#CC0000';
                ctx.fillRect(screenX + 10, screenY - 2, 3, 2);
                ctx.fillRect(screenX + 14, screenY - 3, 3, 3);
                ctx.fillRect(screenX + 18, screenY - 2, 3, 2);
                ctx.fillStyle = '#FFB366';
                ctx.fillRect(screenX + 22, screenY + 6, 4, 3);
                ctx.fillStyle = '#000000';
                ctx.fillRect(screenX + 13, screenY + 4, 2, 2);
                ctx.fillStyle = '#A9A9A9';
                ctx.fillRect(screenX + 4, screenY + 12, 5, 4);
                ctx.fillRect(screenX + 12, screenY + 13, 5, 4);
                ctx.fillRect(screenX + 20, screenY + 12, 4, 4);
                ctx.fillStyle = '#808080';
                ctx.fillRect(screenX + 3, screenY + 11, 22, 1);
                ctx.fillRect(screenX + 3, screenY + 18, 22, 1);
            }
        }
        class YarnBall {
            constructor(x, y, direction) {
                this.x = x;
                this.y = y;
                this.width = 10;
                this.height = 10;
                this.vx = direction * 5;
                this.vy = -2;
                this.gravity = 0.3;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
            }
            collidesWith(obj) {
                return this.x < obj.x + obj.width && this.x + this.width > obj.x && this.y < obj.y + obj.height && this.y + this.height > obj.y;
            }
            draw(ctx, cameraX) {
                const screenX = this.x - cameraX;
                const screenY = this.y;
                ctx.fillStyle = '#FF69B4';
                ctx.beginPath();
                ctx.arc(screenX + 5, screenY + 5, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FF1493';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(screenX + 5, screenY + 5, 3, 0, Math.PI);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(screenX + 5, screenY + 5, 1, Math.PI, Math.PI * 2);
                ctx.stroke();
                ctx.strokeStyle = '#FF69B4';
                ctx.beginPath();
                ctx.moveTo(screenX, screenY + 8);
                ctx.lineTo(screenX - 4, screenY + 12);
                ctx.stroke();
            }
            isOutOfBounds(levelWidth) {
                return this.x < 0 || this.x > levelWidth || this.y > CONFIG.CANVAS_HEIGHT + 100;
            }
        }
        class GiftBox {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 30;
                this.bobOffset = 0;
                this.bobSpeed = 0.1;
                this.baseY = y;
                this.collected = false;
            }
            update() {
                this.bobOffset += this.bobSpeed;
                this.y = this.baseY + Math.sin(this.bobOffset) * 4;
            }
            collidesWith(player) {
                return this.x < player.x + player.width && this.x + this.width > player.x && this.y < player.y + player.height && this.y + this.height > player.y;
            }
            collect() {
                this.collected = true;
            }
            draw(ctx, cameraX, frameCount) {
                if (this.collected) return;
                const screenX = this.x - cameraX;
                const screenY = this.y;
                const cx = screenX + this.width / 2;
                const cy = screenY + this.height / 2;
                const glow = 0.15 + Math.sin(this.bobOffset * 2) * 0.1;
                ctx.fillStyle = `rgba(255, 215, 0, ${glow})`;
                ctx.beginPath();
                ctx.arc(cx, cy, this.width * 0.8, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#DC143C';
                ctx.fillRect(screenX + 2, screenY + 8, this.width - 4, this.height - 8);
                ctx.fillStyle = '#B01030';
                ctx.fillRect(screenX, screenY + 4, this.width, 7);
                ctx.fillRect(screenX + 6, screenY + 1, this.width - 12, 5);
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(cx - 2, screenY + 4, 4, this.height - 4);
                ctx.fillRect(screenX + 2, cy + 2, this.width - 4, 4);
                ctx.fillRect(cx - 6, screenY, 5, 5);
                ctx.fillRect(cx + 1, screenY, 5, 5);
                ctx.fillStyle = '#DAA520';
                ctx.fillRect(cx - 1, screenY + 1, 3, 3);
                ctx.fillStyle = '#FF69B4';
                ctx.beginPath();
                ctx.arc(cx, cy + 5, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FF1493';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(cx, cy + 5, 3, 0, Math.PI);
                ctx.stroke();
                ctx.fillStyle = '#FFD700';
                const sparkleAngle = this.bobOffset * 3;
                for (let i = 0; i < 3; i++) {
                    const a = sparkleAngle + i * (Math.PI * 2 / 3);
                    const sx = cx + Math.cos(a) * 20;
                    const sy = cy + Math.sin(a) * 14;
                    const sparkleSize = 1.5 + Math.sin(this.bobOffset * 4 + i) * 1;
                    ctx.fillRect(sx - sparkleSize / 2, sy - sparkleSize / 2, sparkleSize, sparkleSize);
                }
            }
        }
        class MilkBottle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 18;
                this.height = 24;
                this.bobOffset = 0;
                this.bobSpeed = 0.08;
                this.baseY = y;
                this.collected = false;
            }
            update() {
                this.bobOffset += this.bobSpeed;
                this.y = this.baseY + Math.sin(this.bobOffset) * 3;
            }
            collidesWith(player) {
                return this.x < player.x + player.width && this.x + this.width > player.x && this.y < player.y + player.height && this.y + this.height > player.y;
            }
            collect() {
                this.collected = true;
            }
            draw(ctx, cameraX) {
                if (this.collected) return;
                const screenX = this.x - cameraX;
                const screenY = this.y;
                const cx = screenX + this.width / 2;
                const glow = 0.1 + Math.sin(this.bobOffset * 2) * 0.06;
                ctx.fillStyle = `rgba(255, 100, 100, ${glow})`;
                ctx.beginPath();
                ctx.arc(cx, screenY + this.height / 2, this.width * 0.7, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#DD0000';
                ctx.fillRect(screenX + 5, screenY + 0, 8, 5);
                ctx.fillStyle = '#FF4444';
                ctx.fillRect(screenX + 6, screenY + 1, 3, 2);
                ctx.fillStyle = '#E8E8E8';
                ctx.fillRect(screenX + 6, screenY + 5, 6, 3);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(screenX + 3, screenY + 8, 12, 14);
                ctx.fillStyle = '#F0F8FF';
                ctx.fillRect(screenX + 4, screenY + 12, 10, 8);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fillRect(screenX + 4, screenY + 9, 2, 3);
            }
        }
        class HayBale {
            constructor(x, y, crumbly = false) {
                this.x = x;
                this.y = y;
                this.width = 50;
                this.height = 30;
                this.crumbly = crumbly;
                this.shakeIntensity = 0;
                this.collected = false;
            }
            update() {
                if (this.shakeIntensity > 0) this.shakeIntensity--;
            }
            collidesWith(player) {
                return this.x < player.x + player.width && this.x + this.width > player.x && this.y < player.y + player.height && this.y + this.height > player.y;
            }
            bounce(player) {
                player.vy = -18;
                if (this.crumbly) {
                    this.shakeIntensity = 15;
                    this.collected = true;
                }
            }
            draw(ctx, cameraX) {
                if (this.collected) return;
                const screenX = this.x - cameraX;
                let screenY = this.y;
                if (this.shakeIntensity > 0) screenY += (Math.random() - 0.5) * 2;
                ctx.fillStyle = '#D4A574';
                ctx.fillRect(screenX, screenY, this.width, this.height);
                ctx.strokeStyle = '#B8860B';
                ctx.lineWidth = 1;
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo(screenX, screenY + i * 6);
                    ctx.lineTo(screenX + this.width, screenY + i * 6 + 3);
                    ctx.stroke();
                }
                ctx.strokeStyle = '#F0E68C';
                ctx.lineWidth = 1;
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    ctx.moveTo(screenX, screenY + 3 + i * 6);
                    ctx.lineTo(screenX + this.width, screenY + 6 + i * 6);
                    ctx.stroke();
                }
                if (this.crumbly) {
                    ctx.fillStyle = 'rgba(184, 134, 11, 0.6)';
                    for (let i = 0; i < 5; i++) {
                        const px = screenX + Math.random() * this.width;
                        const py = screenY + Math.random() * this.height;
                        ctx.fillRect(px, py, 3, 3);
                    }
                }
            }
        }
        class CatnipBox {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 28;
                this.height = 28;
                this.bobOffset = 0;
                this.bobSpeed = 0.12;
                this.baseY = y;
                this.collected = false;
            }
            update() {
                this.bobOffset += this.bobSpeed;
                this.y = this.baseY + Math.sin(this.bobOffset) * 4;

            update(player) {
                const levelWidth = this.getLevelWidth();
                for (let mp of this.movingPlatforms) mp.update();
                for (let bale of this.hayBales) bale.update();
                for (let catnip of this.catnipBoxes) catnip.update();
                for (let enemy of this.enemies) {
                    enemy.update();
                    enemy.platformCheck(this.platforms);
                    if (player.collidesWith(enemy)) {
                        if (player.vy > 0 && player.y + player.height - player.vy < enemy.y + enemy.height / 2) {
                            this.emitter.emit(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, 8, ['#FFFFFF', '#FF6B6B', '#FFB6C1'], {
                                min: 1,
                                max: 3
                            });
                            player.bounceOffEnemy();
                            enemy.hp = 0;
                        } else if (player.invincibleTime <= 0) {
                            player.takeDamage();
                            if (player.hp <= 0) player.respawn();
                        }
                    }
                }
                this.enemies = this.enemies.filter(e => e.hp === undefined || e.hp > 0);
                for (let fp of this.fadingPlatforms) fp.update();
                for (let item of this.items) item.update();
                const itemsToRemove = [];
                for (let i = 0; i < this.items.length; i++) {
                    const item = this.items[i];
                    if (!item.collected && item.collidesWith(player)) {
                        if (item instanceof GiftBox) {
                            player.addYarnBalls(10);
                            this.emitter.emit(item.x + item.width / 2, item.y + item.height / 2, 10, ['#FFD700', '#FFA500', '#FF69B4'], {
                                min: 1,
                                max: 3
                            });
                            item.collect();
                            itemsToRemove.push(i);
                        } else if (item instanceof MilkBottle) {
                            player.heal(1);
                            this.emitter.emit(item.x + item.width / 2, item.y + item.height / 2, 8, ['#FFD700', '#FFA500'], {
                                min: 1,
                                max: 3
                            });
                            item.collect();
                            itemsToRemove.push(i);
                        }
                    }
                }
                for (let i = itemsToRemove.length - 1; i >= 0; i--) this.items.splice(itemsToRemove[i], 1);
                const catnipToRemove = [];
                for (let i = 0; i < this.catnipBoxes.length; i++) {
                    const catnip = this.catnipBoxes[i];
                    if (!catnip.collected && catnip.collidesWith(player)) {
                        player.applyCatnipBoost();
                        this.emitter.emit(catnip.x + catnip.width / 2, catnip.y + catnip.height / 2, 12, ['#52D97A', '#2ECC71', '#1FA04E'], {
                            min: 1,
                            max: 4
                        });
                        catnip.collect();
                        catnipToRemove.push(i);
                    }
                }
                for (let i = catnipToRemove.length - 1; i >= 0; i--) this.catnipBoxes.splice(catnipToRemove[i], 1);
                const yarnBallsToRemove = [];
                for (let i = 0; i < this.yarnBalls.length; i++) {
                    const ball = this.yarnBalls[i];
                    ball.update();
                    if (ball.isOutOfBounds(levelWidth)) {
                        yarnBallsToRemove.push(i);
                        continue;
                    }
                    for (let j = 0; j < this.enemies.length; j++) {
                        if (ball.collidesWith(this.enemies[j])) {
                            this.emitter.emit(this.enemies[j].x + this.enemies[j].width / 2, this.enemies[j].y + this.enemies[j].height / 2, 8, ['#FFFFFF', '#FF6B6B', '#FFB6C1'], {
                                min: 1,
                                max: 3
                            });
                            this.enemies[j].hp = 0;
                            yarnBallsToRemove.push(i);
                            break;
                        }
                    }
                }
                for (let i = yarnBallsToRemove.length - 1; i >= 0; i--) this.yarnBalls.splice(yarnBallsToRemove[i], 1);
                for (let checkpoint of this.checkpoints) {
                    if (!checkpoint.activated && checkpoint.collidesWith(player)) {
                        checkpoint.activated = true;
                        player.setCheckpoint(checkpoint.x, checkpoint.y - 30);
                        this.emitter.emit(checkpoint.x + checkpoint.width / 2, checkpoint.y, 10, ['#FFD700', '#FFA500'], {
                            min: 1,
                            max: 3
                        });
                    }
                }
                for (let puddle of this.mudPuddles) {
                    if (player.x + player.width > puddle.x && player.x < puddle.x + puddle.width && player.y + player.height > puddle.y + 6 && player.y < puddle.y + 100) {
                        if (player.takeDamage()) {
                            this.emitter.emit(player.x + player.width / 2, player.y + player.height / 2, 8, ['#8B6914', '#A0826D'], {
                                min: 1,
                                max: 3
                            });
                            if (player.hp <= 0) player.respawn();
                            else {
                                player.x = puddle.respawnX;
                                player.y = puddle.respawnY;
                                player.vy = 0;
                            }
                        }
                    }
                }
                // Spike trap damage
                for (let spike of this.spikeTraps) {
                    if (spike.collidesWith(player) && player.invincibleTime <= 0) {
                        player.takeDamage();
                        if (player.hp <= 0) player.respawn();
                        else {
                            player.vy = -8;
                        }
                    }
                }
                // Key collection
                for (let key of this.dungeonKeys) {
                    if (!key.collected && key.collidesWith(player)) {
                        key.collected = true;
                        this.emitter.emit(key.x + 8, key.y + 10, 10, [key.color, '#FFFFFF', '#FFD700'], {
                            min: 1,
                            max: 3
                        });
                        // Unlock matching door
                        for (let door of this.lockedDoors) {
                            if (door.keyId === key.id) door.unlocked = true;
                        }
                    }
                }
                // Update keys and doors
                for (let key of this.dungeonKeys) key.update();
                for (let door of this.lockedDoors) door.update();
                // Boss fight
                if (this.boss) {
                    this.boss.update(player, this);
                    if (this.boss.defeated && this.boss.defeatTimer > 90) return 'victory';
                }
                // Check if player is near the gate - trigger cutscene instead of instant complete
                if (this.levelNumber !== 5 && this.levelGate.x > 0) {
                    const nearGate = player.x + player.width > this.levelGate.x - 60;
                    if (nearGate && !this.gateCutsceneTriggered) {
                        this.gateCutsceneTriggered = true;
                        return 'gateCutscene';
                    }
                }
                return null;
            }
            platformCollision(player) {
                player.isGrounded = false;
                const edgeInset = 6;
                const pLeft = player.x + edgeInset;
                const pRight = player.x + player.width - edgeInset;
                for (let platform of this.platforms) {
                    if (pLeft < platform.x + platform.width && pRight > platform.x && player.y + player.height >= platform.y && player.y + player.height <= platform.y + platform.height + 5 && player.vy >= 0) {
                        player.y = platform.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                    }
                }
                for (let mp of this.movingPlatforms) {
                    if (pLeft < mp.x + mp.width && pRight > mp.x && player.y + player.height >= mp.y && player.y + player.height <= mp.y + mp.height + 5 && player.vy >= 0) {
                        player.y = mp.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                        player.x += mp.deltaX;
                        player.y += mp.deltaY;
                    }
                }
                for (let bale of this.hayBales) {
                    if (!bale.collected && pLeft < bale.x + bale.width && pRight > bale.x && player.y + player.height >= bale.y && player.y + player.height <= bale.y + bale.height + 5 && player.vy >= 0) {
                        bale.bounce(player);
                        player.y = bale.y - player.height;
                        player.isGrounded = true;
                    }
                }
                this.hayBales = this.hayBales.filter(b => !b.collected);
                for (let fp of this.fadingPlatforms) {
                    if (fp.visible && pLeft < fp.x + fp.width && pRight > fp.x && player.y + player.height >= fp.y && player.y + player.height <= fp.y + fp.height + 5 && player.vy >= 0) {
                        player.y = fp.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                    }
                }
                // Locked door collision - blocks player
                for (let door of this.lockedDoors) {
                    if (door.isBlocking()) {
                        if (pLeft < door.x + door.width && pRight > door.x && player.y + player.height > door.y && player.y < door.y + door.height) {
                            if (player.x < door.x) {
                                player.x = door.x - player.width;
                            } else {
                                player.x = door.x + door.width;
                            }
                        }
                    }
                }
            }

                    }
                    ctx.globalAlpha = 1;
                    ctx.globalAlpha = 0.75;
                    const flColors = ['#FF6B9D', '#FFD700', '#FF4444', '#9B59B6', '#3498DB'];
                    const flPos = [60, 90, 140, 250, 310, 420, 480, 560, 920, 980, 1050, 1160, 1250, 1380, 1460, 1650, 1720, 1790, 1880, 1960, 2100, 2180, 2260, 2380, 2450, 2550, 2680, 2780];

                } else if (this.levelNumber === 2) {

                    ctx.beginPath();

                    ctx.globalAlpha = 1;
                    ctx.globalAlpha = 0.5;

                    ctx.beginPath();

                } else if (this.levelNumber === 3) {
                    ctx.fillStyle = '#1a1a2e';

                    ctx.fillStyle = '#FFFFFF';
                    const starPositions = [50, 120, 200, 340, 450, 520, 600, 710, 30, 180, 380, 560, 680, 750, 100, 290, 470, 630];

                    }
                    ctx.globalAlpha = 1;

                    ctx.fillStyle = '#2d2d4e';
                    ctx.beginPath();
                    ctx.moveTo(0, 380);
                    for (let i = 0; i <= CONFIG.CANVAS_WIDTH + 100; i += 5) {

                    }
                    ctx.lineTo(CONFIG.CANVAS_WIDTH, 440);
                    ctx.lineTo(0, 440);
                    ctx.closePath();
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.globalAlpha = 0.6;
                    const spookyTrees = [80, 250, 500, 750, 1000, 1300, 1600, 1900, 2200, 2500, 2800, 3100, 3500];
                    for (let st of spookyTrees) {
                        const sx = st - cameraX * 0.4;
                        if (sx < -60 || sx > CONFIG.CANVAS_WIDTH + 60) continue;
                        ctx.fillStyle = '#1a1a2e';
                        ctx.fillRect(sx - 4, 380, 8, 55);
                        ctx.fillStyle = '#2a2a3e';
                        ctx.beginPath();
                        ctx.moveTo(sx - 25, 385);
                        ctx.lineTo(sx, 320);
                        ctx.lineTo(sx + 25, 385);
                        ctx.closePath();
                        ctx.fill();
                        ctx.beginPath();
                        ctx.moveTo(sx - 18, 355);
                        ctx.lineTo(sx, 300);
                        ctx.lineTo(sx + 18, 355);
                        ctx.closePath();
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                    ctx.globalAlpha = 0.7;
                    const mushPositions = [150, 400, 700, 1050, 1350, 1700, 2050, 2350, 2750, 3100, 3450];
                    const mushColors = ['#00FF88', '#88FF00', '#00FFCC'];
                    for (let mi = 0; mi < mushPositions.length; mi++) {
                        const mx = mushPositions[mi] - cameraX * 0.7;
                        if (mx < -10 || mx > CONFIG.CANVAS_WIDTH + 10) continue;
                        const glowPulse = 0.4 + Math.sin(Date.now() * 0.002 + mi * 1.5) * 0.3;
                        ctx.fillStyle = mushColors[mi % mushColors.length];
                        ctx.globalAlpha = glowPulse * 0.3;
                        ctx.beginPath();
                        ctx.arc(mx, 432, 8, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 0.7;
                        ctx.fillStyle = '#8B7355';
                        ctx.fillRect(mx - 1, 432, 3, 6);
                        ctx.fillStyle = mushColors[mi % mushColors.length];
                        ctx.beginPath();
                        ctx.arc(mx, 432, 5, Math.PI, 0);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                    ctx.globalAlpha = 0.2;
                    ctx.strokeStyle = '#CCCCCC';
                    ctx.lineWidth = 0.5;
                    const webPositions = [200, 600, 1100, 1500, 2100, 2600, 3000, 3400];
                    for (let wp of webPositions) {
                        const wx = wp - cameraX * 0.5;
                        if (wx < -30 || wx > CONFIG.CANVAS_WIDTH + 30) continue;
                        ctx.beginPath();
                        ctx.moveTo(wx, 380);
                        ctx.lineTo(wx + 15, 395);
                        ctx.lineTo(wx - 15, 395);
                        ctx.closePath();
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(wx, 385);
                        ctx.lineTo(wx + 8, 395);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(wx, 385);
                        ctx.lineTo(wx - 8, 395);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                } else if (this.levelNumber === 4) {
                    // Level 4: The Dungeon
                    ctx.fillStyle = '#0d0d15';
                    ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                    // Stone wall texture
                    ctx.globalAlpha = 0.15;
                    ctx.fillStyle = '#333344';
                    for (let row = 0; row < 12; row++) {
                        for (let col = 0; col < 20; col++) {
                            const bx = col * 45 + (row % 2) * 22 - (cameraX * 0.05) % 45;
                            const by = row * 40;
                            ctx.fillRect(bx, by, 43, 38);
                            ctx.fillStyle = '#0d0d15';
                            ctx.fillRect(bx + 43, by, 2, 40);
                            ctx.fillRect(bx, by + 38, 45, 2);
                            ctx.fillStyle = '#333344';
                        }
                    }
                    ctx.globalAlpha = 1;
                    // Dripping water effects
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = '#4466AA';
                    const dripPositions = [120, 350, 580, 780, 1050, 1350, 1600, 1900, 2200, 2500, 2800, 3100, 3500, 3800];
                    for (let di = 0; di < dripPositions.length; di++) {
                        const dx = dripPositions[di] - cameraX * 0.9;
                        if (dx < -5 || dx > CONFIG.CANVAS_WIDTH + 5) continue;
                        const dripY = (Date.now() * 0.05 + di * 200) % 440;
                        ctx.beginPath();
                        ctx.arc(dx, dripY, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                        if (dripY > 430) {
                            ctx.globalAlpha = 0.2;
                            ctx.beginPath();
                            ctx.arc(dx, 438, 3 + (dripY - 430), 0, Math.PI * 2);

                            ctx.globalAlpha = 0.4;

                    }
                    ctx.globalAlpha = 1;
                    // Torch brackets on walls
                    ctx.globalAlpha = 0.9;
                    const torchPositions = [200, 500, 850, 1200, 1550, 1900, 2250, 2600, 2950, 3300, 3650];
                    for (let ti = 0; ti < torchPositions.length; ti++) {
                        const tx = torchPositions[ti] - cameraX * 0.95;
                        if (tx < -20 || tx > CONFIG.CANVAS_WIDTH + 20) continue;
                        // Torch bracket
                        ctx.fillStyle = '#555555';
                        ctx.fillRect(tx - 2, 360, 4, 20);

                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(tx - 3, 340, 6, 20);
                        // Flame
                        const flicker = Math.sin(Date.now() * 0.01 + ti * 2) * 2;
                        const flicker2 = Math.cos(Date.now() * 0.015 + ti * 3) * 1.5;
                        ctx.fillStyle = '#FF6600';
                        ctx.beginPath();
                        ctx.arc(tx + flicker2, 335 + flicker, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FFAA00';
                        ctx.beginPath();
                        ctx.arc(tx + flicker2 * 0.5, 333 + flicker, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FFDD44';
                        ctx.beginPath();
                        ctx.arc(tx, 332 + flicker * 0.5, 2, 0, Math.PI * 2);
                        ctx.fill();
                        // Torch glow
                        ctx.globalAlpha = 0.08 + Math.sin(Date.now() * 0.008 + ti) * 0.03;
                        ctx.fillStyle = '#FF8800';
                        ctx.beginPath();
                        ctx.arc(tx, 340, 50, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 0.9;
                    }
                    ctx.globalAlpha = 1;
                    // Chains hanging from ceiling
                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = '#666677';
                    const chainPositions = [300, 700, 1100, 1500, 2000, 2400, 2800, 3200, 3600];
                    for (let ci = 0; ci < chainPositions.length; ci++) {
                        const cx = chainPositions[ci] - cameraX * 0.85;
                        if (cx < -10 || cx > CONFIG.CANVAS_WIDTH + 10) continue;
                        const chainLen = 40 + (ci % 3) * 20;
                        for (let link = 0; link < chainLen; link += 8) {
                            ctx.fillRect(cx - 1, link, 3, 6);
                        }
                    }
                    ctx.globalAlpha = 1;
                    // Skull decorations
                    ctx.globalAlpha = 0.35;
                    const skullPositions = [400, 1000, 1700, 2500, 3400];
                    for (let si = 0; si < skullPositions.length; si++) {
                        const skx = skullPositions[si] - cameraX * 0.9;
                        if (skx < -15 || skx > CONFIG.CANVAS_WIDTH + 15) continue;
                        ctx.fillStyle = '#CCCCAA';
                        ctx.beginPath();
                        ctx.arc(skx, 430, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#0d0d15';
                        ctx.fillRect(skx - 2, 428, 2, 2);
                        ctx.fillRect(skx + 1, 428, 2, 2);
                        ctx.fillRect(skx - 1, 432, 3, 2);
                    }
                    ctx.globalAlpha = 1;
                } else {
                    // Level 5: The Throne Room
                    ctx.fillStyle = '#1a0a0a';
                    ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                    // Stone wall with red tint
                    ctx.globalAlpha = 0.12;
                    ctx.fillStyle = '#442222';
                    for (let row = 0; row < 12; row++) {
                        for (let col = 0; col < 20; col++) {
                            const bx = col * 45 + (row % 2) * 22;
                            const by = row * 40;
                            ctx.fillRect(bx, by, 43, 38);
                            ctx.fillStyle = '#1a0a0a';
                            ctx.fillRect(bx + 43, by, 2, 40);
                            ctx.fillRect(bx, by + 38, 45, 2);
                            ctx.fillStyle = '#442222';
                        }
                    }
                    ctx.globalAlpha = 1;
                    // Tall arched windows with red light
                    ctx.globalAlpha = 0.2;
                    const windowPositions = [100, 350, 600];
                    for (let wi = 0; wi < windowPositions.length; wi++) {
                        const wx = windowPositions[wi];
                        ctx.fillStyle = '#330000';
                        ctx.fillRect(wx - 15, 50, 30, 120);
                        ctx.beginPath();
                        ctx.arc(wx, 50, 15, 0, Math.PI, true);
                        ctx.fill();
                        ctx.fillStyle = '#661111';
                        ctx.globalAlpha = 0.15 + Math.sin(Date.now() * 0.003 + wi) * 0.05;
                        ctx.fillRect(wx - 12, 55, 24, 110);
                    }
                    ctx.globalAlpha = 1;
                    // Grand red banners
                    ctx.globalAlpha = 0.6;
                    const bannerPositions = [160, 400, 640];
                    for (let bi = 0; bi < bannerPositions.length; bi++) {
                        const bx = bannerPositions[bi];
                        const sway = Math.sin(Date.now() * 0.002 + bi * 2) * 3;
                        ctx.fillStyle = '#8B0000';
                        ctx.fillRect(bx - 16, 0, 32, 200);
                        ctx.fillStyle = '#AA1111';
                        ctx.fillRect(bx - 12, 4, 24, 192);
                        // Banner bottom triangle
                        ctx.fillStyle = '#8B0000';
                        ctx.beginPath();
                        ctx.moveTo(bx - 16, 200);
                        ctx.lineTo(bx + sway, 240);
                        ctx.lineTo(bx + 16, 200);
                        ctx.closePath();
                        ctx.fill();
                        // Chicken emblem (circle + beak)
                        ctx.fillStyle = '#FFD700';
                        ctx.beginPath();
                        ctx.arc(bx, 100, 8, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FF8C00';
                        ctx.beginPath();
                        ctx.moveTo(bx - 8, 100);
                        ctx.lineTo(bx - 14, 102);
                        ctx.lineTo(bx - 8, 104);
                        ctx.closePath();
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                    // Torches on walls
                    ctx.globalAlpha = 0.9;
                    const tPositions = [50, 250, 550, 750];
                    for (let ti = 0; ti < tPositions.length; ti++) {
                        const tx = tPositions[ti];
                        ctx.fillStyle = '#555555';
                        ctx.fillRect(tx - 2, 300, 4, 20);
                        ctx.fillRect(tx - 6, 298, 12, 4);
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(tx - 3, 280, 6, 20);
                        const flicker = Math.sin(Date.now() * 0.01 + ti * 2) * 2;
                        ctx.fillStyle = '#FF6600';
                        ctx.beginPath();
                        ctx.arc(tx, 275 + flicker, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FFAA00';
                        ctx.beginPath();
                        ctx.arc(tx, 273 + flicker, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FFDD44';
                        ctx.beginPath();
                        ctx.arc(tx, 272 + flicker * 0.5, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 0.06 + Math.sin(Date.now() * 0.008 + ti) * 0.02;
                        ctx.fillStyle = '#FF8800';
                        ctx.beginPath();
                        ctx.arc(tx, 280, 45, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 0.9;
                    }
                    ctx.globalAlpha = 1;
                    // Throne in background (center)
                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = '#3a1a1a';
                    ctx.fillRect(360, 320, 80, 120);
                    ctx.fillStyle = '#5a2a2a';
                    ctx.fillRect(365, 325, 70, 115);
                    // Throne back
                    ctx.fillStyle = '#3a1a1a';
                    ctx.fillRect(370, 260, 60, 65);
                    ctx.fillStyle = '#4a2020';
                    ctx.fillRect(375, 265, 50, 55);
                    // Throne crown detail
                    ctx.fillStyle = '#FFD700';
                    ctx.globalAlpha = 0.4;
                    ctx.fillRect(385, 255, 10, 10);
                    ctx.fillRect(395, 250, 10, 15);
                    ctx.fillRect(405, 255, 10, 10);
                    ctx.globalAlpha = 1;
                    // Red carpet
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = '#8B0000';
                    ctx.fillRect(340, CONFIG.GROUND_Y - 4, 120, 4);
                    ctx.fillRect(330, CONFIG.GROUND_Y, 140, 40);
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(340, CONFIG.GROUND_Y - 2, 120, 1);
                    ctx.fillRect(340, CONFIG.GROUND_Y + 2, 120, 1);
                    ctx.globalAlpha = 1;
                }
                // Draw platforms with level-appropriate style
                for (let platform of this.platforms) {
                    const screenX = platform.x - cameraX;
                    if (screenX + platform.width > 0 && screenX < CONFIG.CANVAS_WIDTH) {
                        if (this.levelNumber >= 4) {
                            ctx.fillStyle = '#555566';
                            ctx.fillRect(screenX, platform.y - 4, platform.width, 4);
                            ctx.fillStyle = '#3a3a4a';
                            ctx.fillRect(screenX, platform.y, platform.width, platform.height);
                            // Stone block lines
                            ctx.strokeStyle = '#2a2a3a';
                            ctx.lineWidth = 1;
                            for (let bx = screenX; bx < screenX + platform.width; bx += 20) {
                                ctx.beginPath();
                                ctx.moveTo(bx, platform.y);
                                ctx.lineTo(bx, platform.y + platform.height);
                                ctx.stroke();
                            }
                        } else {
                            ctx.fillStyle = '#228B22';
                            ctx.fillRect(screenX, platform.y - 6, platform.width, 6);
                            ctx.fillStyle = '#8B4513';
                            ctx.fillRect(screenX, platform.y, platform.width, platform.height);
                        }
                    }
                }
                for (let puddle of this.mudPuddles) {
                    const screenX = puddle.x - cameraX;
                    if (screenX + puddle.width > 0 && screenX < CONFIG.CANVAS_WIDTH) {
                        ctx.fillStyle = '#5C4033';
                        ctx.fillRect(screenX, puddle.y, puddle.width, 50);
                        ctx.fillStyle = '#8B6914';
                        ctx.fillRect(screenX, puddle.y, puddle.width, 10);
                    }
                }
                for (let mp of this.movingPlatforms) mp.draw(ctx, cameraX);
                for (let fp of this.fadingPlatforms) fp.draw(ctx, cameraX);
                for (let bale of this.hayBales) bale.draw(ctx, cameraX);
                for (let catnip of this.catnipBoxes) catnip.draw(ctx, cameraX, 0);
                for (let item of this.items) item.draw(ctx, cameraX);
                for (let enemy of this.enemies) enemy.draw(ctx, cameraX);
                for (let spike of this.spikeTraps) spike.draw(ctx, cameraX);
                for (let key of this.dungeonKeys) key.draw(ctx, cameraX);
                for (let door of this.lockedDoors) door.draw(ctx, cameraX);
                for (let checkpoint of this.checkpoints) checkpoint.draw(ctx, cameraX);
                if (this.boss) this.boss.draw(ctx, cameraX);
                this.levelGate.draw(ctx, cameraX);
                for (let ball of this.yarnBalls) ball.draw(ctx, cameraX);
                this.emitter.draw(ctx, cameraX);
            }
        }
        class Game {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.gameState = 'title';
                this.player = null;
                this.level = null;
                this.cameraX = 0;
                this.score = 0;
                this.currentLevel = 1;
                this.enemiesDefeated = 0;
                this.keys = {};
                this.shakeIntensity = 0;
                this.frameCount = 0;
                this.levelIntroTimer = 0;
                this.victoryTimer = 0;
                this.titleTimer = 0;
                this.cutsceneTimer = 0;
                this.cutscenePine = null;
                this.cutsceneHearts = [];
                this.levelTimer = 0;
                this.levelTimeBonus = 0;
                this.highScores = this.loadHighScores();
                this.highScoreEntry = false;
                this.highScoreName = '';
                this.highScoreRank = -1;
                this.highScoreChecked = false;
                this.parTimes = { 1: 60, 2: 75, 3: 90, 4: 105, 5: 120 };
                this.setupInput();
                this.startGame();
            }
            setupInput() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (this.gameState === 'highScoreEntry') {
                        if (e.key === 'Backspace') {
                            this.highScoreName = this.highScoreName.slice(0, -1);
                        } else if (e.key === 'Enter' && this.highScoreName.length > 0) {
                            this.submitHighScore();
                            this.gameState = 'highScoreTable';
                        } else if (e.key.length === 1 && this.highScoreName.length < 10) {
                            this.highScoreName += e.key.toUpperCase();
                        }
                        return;
                    }
                    if (e.key === 'z' || e.key === 'Z' || e.key === 'ArrowUp') {
                        if (this.gameState === 'playing' && this.player) {
                            const ball = this.player.throwYarnBall();
                            if (ball) this.level.yarnBalls.push(ball);
                        }
                    }
                });
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
            }
            startGame() {
                this.gameState = 'title';
            }
            startLevel(levelNumber) {
                const prevLives = this.player ? this.player.lives : (this.playerLives != null ? this.playerLives : 2);
                this.player = new Player(80, 402);
                this.player.lives = prevLives;
                this.level = new Level(levelNumber);
                this.level.yarnBalls = [];
                this.cameraX = 0;
                this.currentLevel = levelNumber;
                this.enemiesDefeated = 0;
                this.levelTimer = 0;
                this.gameState = 'playing';
            }
            loadHighScores() {
                try {
                    const data = localStorage.getItem('princeAppleHighScores');
                    if (data) return JSON.parse(data);
                } catch (e) {}
                return [];
            }
            saveHighScores() {
                try {
                    localStorage.setItem('princeAppleHighScores', JSON.stringify(this.highScores));
                } catch (e) {}
            }
            checkHighScore(score) {
                if (this.highScores.length < 10 || score > this.highScores[this.highScores.length - 1].score) {
                    this.highScoreEntry = true;
                    this.highScoreName = '';
                    this.highScoreRank = this.highScores.findIndex(h => score > h.score);
                    if (this.highScoreRank === -1) this.highScoreRank = this.highScores.length;
                    return true;
                }
                return false;
            }
            submitHighScore() {
                this.highScores.splice(this.highScoreRank, 0, { name: this.highScoreName || 'AAA', score: this.score });
                if (this.highScores.length > 10) this.highScores.length = 10;
                this.saveHighScores();
                this.highScoreEntry = false;
            }
            showLevelIntro(levelNumber) {
                this.gameState = 'levelIntro';
                this.currentLevel = levelNumber;
                this.levelIntroTimer = 120;
            }
            update() {
                if (this.gameState === 'title') {
                    this.titleTimer++;
                    if (this.keys[' '] && this.titleTimer > 30) {
                        this.keys[' '] = false;
                        this.titleTimer = 0;
                        this.score = 0;
                        this.highScoreChecked = false;
                        this.playerLives = 2;
                        this.showLevelIntro(1);
                    }
                } else if (this.gameState === 'levelIntro') {
                    this.levelIntroTimer--;
                    if (this.levelIntroTimer <= 0) this.startLevel(this.currentLevel);
                    if (this.keys[' ']) {
                        this.keys[' '] = false;
                        this.startLevel(this.currentLevel);
                    }
                } else if (this.gameState === 'playing') {
                    this.frameCount++;
                    this.levelTimer++;
                    const levelWidth = this.level.getLevelWidth();
                    this.player.update(this.keys, levelWidth);
                    this.level.platformCollision(this.player);
                    const levelStatus = this.level.update(this.player);
                    if (levelStatus === 'victory') {
                        this.gameState = 'victoryCutscene';
                        this.score += this.player.hp * 100;
                        const timeSecs = Math.floor(this.levelTimer / 60);
                        const par = this.parTimes[this.currentLevel] || 90;
                        this.levelTimeBonus = Math.max(0, (par - timeSecs) * 10);
                        this.score += this.levelTimeBonus;
                        this.cutsceneTimer = 0;
                        this.cutscenePine = { x: CONFIG.CANVAS_WIDTH + 40, y: CONFIG.GROUND_Y - 30 };
                        this.cutsceneHearts = [];
                        for (let e of this.level.enemies) { e.fleeing = true; }
                    } else if (levelStatus === 'gateCutscene') {
                        this.gameState = 'gateCutscene';
                        this.gateCutsceneTimer = 0;
                        this.gateCutscenePhase = 'walkToGate';
                        this.score += this.player.hp * 50;
                        const timeSecs = Math.floor(this.levelTimer / 60);
                        const par = this.parTimes[this.currentLevel] || 90;
                        this.levelTimeBonus = Math.max(0, (par - timeSecs) * 10);
                        this.score += this.levelTimeBonus;
                        // Reset the mcnug cameo so it enters fresh during cutscene
                        // McNug stops at triggerX + 250, so set triggerX so he stops just right of the gate
                        const gateX = this.level.levelGate.x;
                        const stopX = gateX + 80;
                        const cameoTriggerX = stopX - 250;
                        this.level.mcnugCameo = new McNugCameo(cameoTriggerX, CONFIG.GROUND_Y, this.currentLevel);
                        this.level.mcnugCameo.triggered = true;
                        this.level.mcnugCameo.phase = 'entering';
                        this.level.mcnugCameo.x = gateX + 400;
                    }
                    if (this.player.dead) {
                        this.gameState = 'gameOver';
                        this.gameOverTimer = 0;
                    }
                    const currentEnemies = this.level.enemies.length;
                    const totalEnemies = this.currentLevel === 1 ? 4 : this.currentLevel === 4 ? 6 : this.currentLevel === 5 ? 0 : 5;
                    this.enemiesDefeated = Math.max(0, totalEnemies - currentEnemies);
                    const targetCameraX = Math.max(0, Math.min(this.player.x - CONFIG.CANVAS_WIDTH / 3, levelWidth - CONFIG.CANVAS_WIDTH));
                    this.cameraX += (targetCameraX - this.cameraX) * 0.1;
                    if (this.shakeIntensity > 0) this.shakeIntensity--;
                } else if (this.gameState === 'gateCutscene') {
                    this.gateCutsceneTimer++;
                    const gateX = this.level.levelGate.x;
                    const gateStopX = gateX - this.player.width - 5;
                    // Keep gravity and platform collision active
                    this.player.vy += CONFIG.GRAVITY;
                    if (this.player.vy > 15) this.player.vy = 15;
                    this.player.y += this.player.vy;
                    this.level.platformCollision(this.player);
                    // Camera pans to show space right of the gate for McNug to appear
                    // Use extended level width so camera can see past the gate
                    const extendedWidth = gateX + CONFIG.CANVAS_WIDTH * 0.7;
                    const cutsceneCamTarget = Math.max(0, Math.min(gateX - CONFIG.CANVAS_WIDTH * 0.3, extendedWidth - CONFIG.CANVAS_WIDTH));
                    this.cameraX += (cutsceneCamTarget - this.cameraX) * 0.08;
                    if (this.gateCutscenePhase === 'walkToGate') {
                        // Apple auto-walks to the gate
                        if (this.player.x < gateStopX) {
                            this.player.x += 2;
                            this.player.facing = 1;
                            this.frameCount++;
                        } else {
                            this.player.x = gateStopX;
                            this.gateCutscenePhase = 'pause';
                            this.gateCutsceneTimer = 0;
                        }
                    } else if (this.gateCutscenePhase === 'pause') {
                        // Brief pause before McNug appears
                        if (this.gateCutsceneTimer > 30) {
                            this.gateCutscenePhase = 'mcnugEnter';
                            this.gateCutsceneTimer = 0;
                        }
                    } else if (this.gateCutscenePhase === 'mcnugEnter') {
                        // McNug and Pine walk in from right
                        if (this.level.mcnugCameo) {
                            this.level.mcnugCameo.update(this.level.mcnugCameo.triggerX + 100);
                            if (this.level.mcnugCameo.phase === 'done') {
                                this.gateCutscenePhase = 'complete';
                                this.gateCutsceneTimer = 0;
                            }
                        }
                    } else if (this.gateCutscenePhase === 'complete') {
                        if (this.gateCutsceneTimer > 30) {
                            this.gameState = 'levelComplete';
                        }
                    }
                } else if (this.gameState === 'levelComplete') {
                    if (this.keys[' ']) {
                        this.keys[' '] = false;
                        if (this.currentLevel === 1) {
                            this.showLevelIntro(2);
                        } else if (this.currentLevel === 2) {
                            this.showLevelIntro(3);
                        } else if (this.currentLevel === 3) {
                            this.showLevelIntro(4);
                        } else if (this.currentLevel === 4) {
                            this.showLevelIntro(5);
                        } else {
                            this.gameState = 'title';
                            this.titleTimer = 0;
                            this.currentLevel = 1;
                        }
                    }
                } else if (this.gameState === 'gameOver') {
                    this.gameOverTimer++;
                    if (this.keys[' '] && this.gameOverTimer > 60) {
                        this.keys[' '] = false;
                        this.player = null;
                        this.gameState = 'title';
                        this.titleTimer = 0;
                        this.currentLevel = 1;
                    }
                } else if (this.gameState === 'victoryCutscene') {
                    this.cutsceneTimer++;
                    const ct = this.cutsceneTimer;
                    const groundLevel = CONFIG.GROUND_Y - this.player.height;
                    // Force player to ground level immediately
                    if (this.player.y < groundLevel) {
                        this.player.y += 4;
                        if (this.player.y > groundLevel) this.player.y = groundLevel;
                    }
                    this.player.vy = 0;
                    // Phase 1 (0-60): chickens flee right
                    for (let e of this.level.enemies) {
                        if (e.fleeing) { e.x += 4; }
                    }
                    this.level.enemies = this.level.enemies.filter(e => e.x < CONFIG.CANVAS_WIDTH + 100);
                    // Both meet at centre, on the ground
                    const meetCenterX = CONFIG.CANVAS_WIDTH / 2;
                    const pineGroundY = CONFIG.GROUND_Y - 26;
                    // Phase 2 (60+): Princess Pine walks in from right towards center
                    if (ct > 60 && this.cutscenePine) {
                        this.cutscenePine.y = pineGroundY;
                        if (this.cutscenePine.x > meetCenterX + 15) {
                            this.cutscenePine.x -= 2;
                        }
                    }
                    // Phase 2b (60+): Apple walks towards center at ground level
                    if (ct > 60) {
                        this.player.y = groundLevel;
                        if (this.player.x < meetCenterX - 15) {
                            this.player.x += 2;
                        } else if (this.player.x > meetCenterX + 15) {
                            this.player.x -= 2;
                        }
                    }
                    // Phase 3 (150+): Embrace with hearts
                    if (ct > 150 && ct % 15 === 0) {
                        const hx = meetCenterX;
                        const hy = groundLevel - 20;
                        this.cutsceneHearts.push({ x: hx + (Math.random() - 0.5) * 40, y: hy, life: 80, vx: (Math.random() - 0.5) * 0.5, size: 12 + Math.random() * 8 });
                    }
                    for (let h of this.cutsceneHearts) { h.y -= 0.8; h.x += h.vx; h.life--; }
                    this.cutsceneHearts = this.cutsceneHearts.filter(h => h.life > 0);
                    // Phase 4 (250+): Transition to victory screen
                    if (ct > 280) {
                        this.gameState = 'victory';
                        this.victoryTimer = 0;
                    }
                } else if (this.gameState === 'victory') {
                    this.victoryTimer++;
                    if (this.victoryTimer > 180) {
                        if (!this.highScoreChecked) {
                            this.highScoreChecked = true;
                            if (this.checkHighScore(this.score)) {
                                this.gameState = 'highScoreEntry';
                            } else {
                                this.gameState = 'highScoreTable';
                            }
                        }
                    }
                } else if (this.gameState === 'highScoreEntry') {
                    // Name entry handled by keydown listener
                } else if (this.gameState === 'highScoreTable') {
                    if (this.keys[' ']) {
                        this.keys[' '] = false;
                        this.gameState = 'title';
                        this.titleTimer = 0;
                        this.currentLevel = 1;
                        this.highScoreChecked = false;
                    }
                }
            }
            draw() {
                const shake = {
                    x: (Math.random() - 0.5) * this.shakeIntensity,
                    y: (Math.random() - 0.5) * this.shakeIntensity
                };
                if (this.gameState === 'title') {
                    this.drawTitleScreen();
                } else if (this.gameState === 'levelIntro') {
                    this.drawLevelIntroScreen();
                } else if (this.gameState === 'playing') {
                    this.ctx.save();
                    this.ctx.translate(shake.x, shake.y);
                    this.level.draw(this.ctx, this.cameraX);
                    this.player.draw(this.ctx, this.cameraX, this.frameCount);
                    this.ctx.restore();
                    this.drawHUD();
                } else if (this.gameState === 'gateCutscene') {
                    this.level.draw(this.ctx, this.cameraX);
                    this.player.draw(this.ctx, this.cameraX, this.frameCount);
                    if (this.level.mcnugCameo) this.level.mcnugCameo.draw(this.ctx, this.cameraX);
                    this.drawHUD();
                } else if (this.gameState === 'levelComplete') {
                    this.level.draw(this.ctx, this.cameraX);
                    this.player.draw(this.ctx, this.cameraX, this.frameCount);
                    this.drawLevelCompleteScreen();
                } else if (this.gameState === 'gameOver') {
                    this.level.draw(this.ctx, this.cameraX);
                    this.drawGameOverScreen();
                } else if (this.gameState === 'victoryCutscene') {
                    this.level.draw(this.ctx, this.cameraX);
                    for (let e of this.level.enemies) e.draw(this.ctx, this.cameraX);
                    this.player.draw(this.ctx, this.cameraX, this.frameCount);
                    // Draw Princess Pine walking in
                    if (this.cutsceneTimer > 60 && this.cutscenePine) {
                        this.drawCutscenePine(this.ctx, this.cutscenePine.x - this.cameraX, this.cutscenePine.y);
                    }
                    // Draw floating hearts
                    for (let h of this.cutsceneHearts) {
                        const ha = Math.min(1, h.life / 30);
                        this.ctx.globalAlpha = ha;
                        this.ctx.fillStyle = '#FF69B4';
                        this.ctx.font = `${h.size}px Arial`;
                        this.ctx.textAlign = 'center';
                        this.ctx.fillText('\u2665', h.x - this.cameraX, h.y);
                        this.ctx.globalAlpha = 1;
                    }
                    this.ctx.textAlign = 'left';
                    // Fade out at end
                    if (this.cutsceneTimer > 240) {
                        const fadeAlpha = Math.min((this.cutsceneTimer - 240) / 40, 1);
                        this.ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;
                        this.ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                    }
                } else if (this.gameState === 'victory') {
                    this.level.draw(this.ctx, this.cameraX);
                    this.player.draw(this.ctx, this.cameraX, this.frameCount);
                    this.drawVictoryScreen();
                } else if (this.gameState === 'highScoreEntry') {
                    this.drawHighScoreEntry();
                } else if (this.gameState === 'highScoreTable') {
                    this.drawHighScoreTable();
                }
            }
            drawTitleScreen() {
                const ctx = this.ctx;
                const t = this.titleTimer;
                const W = CONFIG.CANVAS_WIDTH;
                const H = CONFIG.CANVAS_HEIGHT;
                // Book background - warm parchment
                ctx.fillStyle = '#3E2723';
                ctx.fillRect(0, 0, W, H);
                // Open book shape
                const bookOpen = Math.min(t / 40, 1);
                const bookW = 720 * bookOpen;
                const bookH = 420;
                const bookX = W / 2 - bookW / 2;
                const bookY = 30;
                // Book shadow
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(bookX + 6, bookY + 6, bookW, bookH);
                // Left page
                ctx.fillStyle = '#FFF8E7';
                ctx.fillRect(bookX, bookY, bookW / 2, bookH);
                // Right page
                ctx.fillStyle = '#FDF5E0';
                ctx.fillRect(bookX + bookW / 2, bookY, bookW / 2, bookH);
                // Book spine
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(bookX + bookW / 2 - 3, bookY, 6, bookH);
                // Book edge shadow
